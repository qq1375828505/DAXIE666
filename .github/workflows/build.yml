name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.0'
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Generate code (build_runner)
      run: flutter pub run build_runner build --delete-conflicting-outputs

    # 解码签名文件
    - name: Decode keystore
      run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release-key.jks

    # 创建 key.properties 供 build.gradle 读取
    - name: Create key.properties
      run: |
        echo "storeFile=release-key.jks" > android/app/key.properties
        echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/app/key.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/app/key.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/app/key.properties

    - name: Build APK
      run: flutter build apk --release

    - name: Rename APK
      run: cp build/app/outputs/flutter-apk/app-release.apk novel-ide-android.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: novel-ide-android.apk

    # 自动创建/更新 Release 并上传 APK（仅 master 分支 push，非 PR）
    - name: Auto Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "latest"
        name: "最新版本"
        body: |
          ## 网文写作IDE Android 最新版

          **安装说明**：支持 Android 6.0+，下载 APK 后直接安装即可。
        files: novel-ide-android.apk
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
